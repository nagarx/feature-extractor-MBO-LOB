# =============================================================================
# E3: NVDA ARCX 128-Feature Fine-Grained Point-Return Regression
# =============================================================================
#
# PURPOSE: Test whether ARCX at fine-grained sampling (event_count=100) produces
# feature IC > 0.05 for point-return labels, enabling a model with tradeable signal.
#
# THREE CONVERGING ADVANTAGES:
#   1. ARCX OFI-return r=0.688 (+14pp vs XNAS 0.577)
#   2. ARCX VWES=1.10 bps (-79% vs XNAS 1.97 bps)
#   3. event_count=100: Kolm showed scalar OFI IC=0.070 (10x vs IC=0.007 at 1000)
#
# KEY DIFFERENCES FROM PRODUCTION CONFIG:
#   - event_count=100 (not 1000) → 10x finer sampling resolution
#   - window_size=20 (not 100) → T=20 retains 99.6% of IC (ablation finding)
#   - stride=5 (not 10) → finer sequence overlap
#   - return_type="point_return" → predicts actual price[t+H], not smoothed average
#   - No experimental features yet → keep 98 stable features for baseline
#
# DECISION GATE (Rule 13):
#   If ANY feature has IC > 0.05 on point-return labels → proceed to training
#   If ZERO features have IC > 0.05 → STOP (signal doesn't exist at ARCX)
#
# REFERENCE:
#   EXPERIMENT_INDEX.md § E3
#   BACKTESTER_AUDIT_PLAN.md § E1 (model r=0.013 on XNAS smoothed)
#   Kolm experiment (IC=0.070 at event_count=100)
#   mbo-statistical-profiler CROSS_EXCHANGE_COMPARISON.md
# =============================================================================

# Forward prices export for P0-style label analysis
export_forward_prices = true

[experiment]
name = "E3: NVDA ARCX Fine-Grained Point-Return Regression"
description = "ARCX event_count=100, T=20, point_return labels, 128 features"
version = "1.0.0"
tags = ["nvda", "arcx", "fine-grained", "point-return", "e3-experiment"]

[symbol]
name = "NVDA"
exchange = "ARCX"
filename_pattern = "arcx-pillar-{date}.mbo.dbn"
tick_size = 0.01

[data]
input_dir = "../data/hot_store"
hot_store_dir = "../data/hot_store"
output_dir = "../data/exports/nvda_arcx_128feat_regression_finegrain"

[dates]
start_date = "2025-02-03"
end_date = "2026-01-06"
exclude_dates = [
    "2025-01-20",   # MLK Day
    "2025-02-17",   # Presidents Day
    "2025-04-18",   # Good Friday
    "2025-05-26",   # Memorial Day
    "2025-06-19",   # Juneteenth
    "2025-07-04",   # Independence Day
    "2025-09-01",   # Labor Day
    "2025-11-27",   # Thanksgiving
    "2025-12-25",   # Christmas
    "2026-01-01",   # New Year's Day
]

[features]
lob_levels = 10
include_derived = true
include_mbo = true
include_signals = true
mbo_window_size = 500    # Smaller window for finer sampling (was 1000)

# No experimental features for baseline — add later if IC gate passes
# [features.experimental]
# enabled = true
# groups = ["institutional_v2", "volatility", "seasonality", "mlofi"]

[sampling]
strategy = "event_based"
event_count = 100         # 10x finer than production (1000)

[sequence]
window_size = 20          # T=20 retains 99.6% of IC (ablation finding)
stride = 5                # 5 samples per sequence step
max_buffer_size = 200000  # Larger buffer for 10x more samples

# POINT-RETURN: predicts actual price[t+H], not smoothed average
[labels]
strategy = "regression"
horizon = 10
horizons = [10, 60, 300]
return_type = "point_return"
smoothing_window = 5
threshold = 0.0008

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

[processing]
error_mode = "collect_errors"
verbose = false

[normalization]
lob_prices = "none"
lob_sizes = "none"
derived = "none"
mbo = "none"
signals = "none"
reference_price = "mid_price"
bilinear_scale_factor = 50.0
