# =============================================================================
# NVDA Dataset Configuration - TLOB Official Repository Style
# =============================================================================
#
# This configuration matches the preprocessing used in the official TLOB
# GitHub repository (TLOB/utils/utils_data.py::z_score_orderbook).
#
# Key Difference from Paper:
# - Paper describes BiN as the normalization layer
# - Repository ALSO applies global Z-score BEFORE BiN
#
# From official repo z_score_orderbook():
#   - All price columns normalized together (shared mean/std)
#   - All size columns normalized together (shared mean/std)
#
# Use this if you want to exactly reproduce the official TLOB results.
# For a cleaner approach, use nvda_tlob_raw.toml instead.
#
# =============================================================================

[experiment]
name = "NVDA TLOB Official Repo Style"
version = "1.0.0"
description = "Matches official TLOB repository preprocessing (global Z-score + BiN)"

[symbol]
name = "NVDA"
exchange = "XNAS"
filename_pattern = "xnas-itch-{date}.mbo.dbn"
tick_size = 0.01

[data]
input_dir = "../data/hot_store"
output_dir = "data/exports/nvda_tlob_repo"

[dates]
start_date = "2025-02-03"
end_date = "2025-09-29"

[features]
lob_levels = 10
include_derived = true
include_mbo = true
include_signals = true

[sampling]
strategy = "event_based"
event_count = 1000

[sequence]
window_size = 100
stride = 10

[labels]
strategy = "tlob"
horizon = 50
smoothing_window = 10
threshold = 0.0008

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

# =============================================================================
# Normalization Configuration - Official TLOB Repository Style
# =============================================================================
#
# This matches the official TLOB repository preprocessing:
#   1. Global Z-score for prices (all 20 price features share mean/std)
#   2. Global Z-score for sizes (all 20 size features share mean/std)
#   3. Then BiN layer applies learnable normalization on top
#
# =============================================================================

[normalization]
# Global Z-score: all prices normalized together, all sizes normalized together
# This is what the official TLOB repository does before feeding to BiN
lob_prices = "global_z_score"
lob_sizes = "global_z_score"

# Derived/MBO can use per-feature z-score or none
derived = "none"
mbo = "none"

# CRITICAL: Never normalize signals (includes categorical features)
signals = "none"

reference_price = "mid_price"
bilinear_scale_factor = 50.0
