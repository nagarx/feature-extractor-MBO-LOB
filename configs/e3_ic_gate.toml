# =============================================================================
# E3 IC Gate: ARCX Fine-Grained Test Split Only (35 days)
# =============================================================================
#
# PURPOSE: Quick IC gate — export only the last 35 trading days at
# event_count=100 to check if ANY feature has IC > 0.05 for ARCX
# point-return labels before committing to the full 233-day export.
#
# This is NOT the full E3 export. If IC gate passes, use
# nvda_arcx_128feat_regression_finegrain.toml for the full export.
# =============================================================================

# Forward prices for label analysis
export_forward_prices = true

[experiment]
name = "E3 IC Gate: ARCX Fine-Grained Test Split"
description = "35-day test split at event_count=100, point_return labels, IC validation"
version = "1.0.0"
tags = ["e3", "ic-gate", "arcx", "fine-grained", "point-return"]

[symbol]
name = "NVDA"
exchange = "ARCX"
filename_pattern = "arcx-pillar-{date}.mbo.dbn"
tick_size = 0.01

[data]
input_dir = "../data/hot_store"
hot_store_dir = "../data/hot_store"
output_dir = "../data/exports/e3_ic_gate"

# Only the last 35 trading days (test split equivalent)
[dates]
start_date = "2025-11-14"
end_date = "2026-01-06"
exclude_dates = [
    "2025-11-27",   # Thanksgiving
    "2025-12-25",   # Christmas
    "2026-01-01",   # New Year's Day
]

[features]
lob_levels = 10
include_derived = true
include_mbo = true
include_signals = true
mbo_window_size = 500

# No experimental features for IC baseline
# [features.experimental]

[sampling]
strategy = "event_based"
event_count = 100

[sequence]
window_size = 20
stride = 5
max_buffer_size = 200000

[labels]
strategy = "regression"
horizon = 10
horizons = [10, 60, 300]
return_type = "point_return"
smoothing_window = 5
threshold = 0.0008

# All days in train/ for easy loading (IC gate doesn't need splits)
[split]
train_ratio = 1.0
val_ratio = 0.0
test_ratio = 0.0

[processing]
error_mode = "collect_errors"
verbose = false

[normalization]
lob_prices = "none"
lob_sizes = "none"
derived = "none"
mbo = "none"
signals = "none"
reference_price = "mid_price"
bilinear_scale_factor = 50.0
