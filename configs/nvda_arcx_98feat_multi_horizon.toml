# =============================================================================
# NVDA ARCX.PILLAR Extended Multi-Horizon TLOB Configuration
# =============================================================================
#
# NYSE Arca MBO data for NVDA -- identical feature/sampling/label settings to
# nvda_extended_multi_horizon.toml (XNAS) to enable fair cross-exchange
# comparison of signal decay across prediction horizons.
#
# Feature set: 40 Raw LOB + 8 Derived + 36 MBO + 14 Signals = 98 features
#
# Label formula (per horizon h):
#   m_smooth(t+h) = (1/k) * sum_{i=0}^{k-1} mid_price(t+h-i)
#   return = (m_smooth(t+h) - mid_price(t)) / mid_price(t)
#   Label = Up (+1) if return > threshold, Down (-1) if < -threshold, else Stable (0)
#
# Reference: Zhang et al. (2019), "DeepLOB", §3.1
#
# Prerequisites:
#   cd MBO-LOB-reconstructor
#   cargo run --release --bin decompress_to_hot_store -- \
#       --input ../data/ARCX_PILLAR/NVDA/mbo_2025-02-03_to_2026-01-07 \
#       --output ../data/hot_store
#
# Usage:
#   cd feature-extractor-MBO-LOB
#   cargo run --release --features parallel --bin export_dataset -- \
#       --config configs/nvda_arcx_98feat_multi_horizon.toml
# =============================================================================

[experiment]
name = "NVDA ARCX Multi-Horizon v1.0"
description = "ARCX dataset (Feb 2025 - Jan 2026) with multi-horizon TLOB labels"
version = "1.0.0"
tags = [
    "nvda",
    "arcx",
    "98-features",
    "multi-horizon",
    "tlob",
]

[symbol]
name = "NVDA"
exchange = "ARCX"
filename_pattern = "arcx-pillar-{date}.mbo.dbn.zst"
tick_size = 0.01

[data]
input_dir = "../data/ARCX_PILLAR/NVDA/mbo_2025-02-03_to_2026-01-07"
hot_store_dir = "../data/hot_store"
output_dir = "../data/exports/arcx_pillar/nvda_multi_horizon"

[dates]
start_date = "2025-02-03"
end_date = "2026-01-06"
# US market holidays (NYSE Arca observes same holidays as Nasdaq)
exclude_dates = [
    "2025-01-20",   # MLK Day
    "2025-02-17",   # Presidents Day
    "2025-04-18",   # Good Friday
    "2025-05-26",   # Memorial Day
    "2025-06-19",   # Juneteenth
    "2025-07-04",   # Independence Day
    "2025-09-01",   # Labor Day
    "2025-11-27",   # Thanksgiving
    "2025-12-25",   # Christmas
    "2026-01-01",   # New Year's Day
]

# =============================================================================
# FEATURE CONFIGURATION - FULL 98 FEATURES
# =============================================================================
# Identical to XNAS multi-horizon config for fair cross-exchange comparison.
# =============================================================================

[features]
lob_levels = 10
include_derived = true
include_mbo = true
include_signals = true
mbo_window_size = 1000

[sampling]
strategy = "event_based"
event_count = 1000

[sequence]
window_size = 100
stride = 10
max_buffer_size = 50000

# =============================================================================
# MULTI-HORIZON TLOB LABELING
# =============================================================================
# Identical horizons and threshold to nvda_extended_multi_horizon.toml.
#
# With event_count=1000, each sample ~0.1-0.5s during active trading:
#   - h=10:  ~1-5 seconds ahead
#   - h=20:  ~2-10 seconds ahead
#   - h=50:  ~5-25 seconds ahead
#   - h=100: ~10-50 seconds ahead
#
# Output: labels.npy shape = [N_sequences, 4] (one label per horizon)
# =============================================================================

[labels]
strategy = "tlob"
horizons = [10, 20, 50, 100]
smoothing_window = 10
threshold = 0.0008

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

[processing]
error_mode = "collect_errors"
verbose = true
