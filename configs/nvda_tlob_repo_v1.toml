# =============================================================================
# NVDA Dataset Configuration - OFFICIAL TLOB REPO MATCHING
# =============================================================================
#
# This configuration matches the EXACT preprocessing from the official TLOB
# GitHub repository (https://github.com/...) for proper model training.
#
# KEY CHANGES FROM PREVIOUS EXPORTS:
# 1. GlobalZScore normalization on prices and sizes (LIKE OFFICIAL REPO)
# 2. 40 LOB features only (MATCHING OFFICIAL REPO)
# 3. Multi-horizon labels for flexibility
#
# Research Reference:
# - TLOB/utils/utils_data.py::z_score_orderbook() applies global z-score
# - TLOB/preprocessing/lobster.py::_normalize_dataframes() confirms this
#
# =============================================================================

[experiment]
name = "NVDA TLOB-Repo Matching (GlobalZScore)"
description = "233-day dataset matching official TLOB repository preprocessing"
version = "5.0.0"
tags = [
    "nvda",
    "40-features",
    "multi-horizon",
    "tlob-repo-match",
    "global-zscore",
    "production",
]

[symbol]
name = "NVDA"
exchange = "XNAS"
filename_pattern = "xnas-itch-{date}.mbo.dbn.zst"
tick_size = 0.01

[data]
input_dir = "../data/NVDA_2025-02-03_to_2026-01-07"
hot_store_dir = "../data/hot_store"
output_dir = "../data/exports/nvda_tlob_repo_v1"

[dates]
start_date = "2025-02-03"
end_date = "2026-01-06"
# US Market Holidays 2025-2026
exclude_dates = [
    "2025-01-20",   # MLK Day
    "2025-02-17",   # Presidents Day
    "2025-04-18",   # Good Friday
    "2025-05-26",   # Memorial Day
    "2025-06-19",   # Juneteenth
    "2025-07-04",   # Independence Day
    "2025-09-01",   # Labor Day
    "2025-11-27",   # Thanksgiving
    "2025-12-25",   # Christmas
    "2026-01-01",   # New Year's Day
]

# =============================================================================
# FEATURE CONFIGURATION - 40 RAW LOB FEATURES ONLY
# =============================================================================
# Official TLOB uses only 40 LOB features for basic experiments.
# Derived, MBO, and signals are DISABLED to match official repo.
# =============================================================================

[features]
lob_levels = 10
include_derived = false    # DISABLED - official TLOB doesn't use these
include_mbo = false        # DISABLED - official TLOB doesn't use these
include_signals = false    # DISABLED - official TLOB doesn't use these
mbo_window_size = 1000

[sampling]
strategy = "event_based"
event_count = 1000
volume_threshold = 1000

[sequence]
window_size = 100
stride = 10
max_buffer_size = 50000

# =============================================================================
# LABELS - Multi-horizon with FIXED Threshold (Baseline)
# =============================================================================
# This config uses FIXED threshold for baseline comparison.
# For official TLOB dynamic threshold, use nvda_tlob_repo_v2.toml
# =============================================================================

[labels]
strategy = "tlob"
horizon = 50
horizons = [10, 20, 50, 100]
smoothing_window = 10
threshold = 0.0008  # Fixed threshold (8 bps)

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

[processing]
error_mode = "collect_errors"
verbose = true

# =============================================================================
# NORMALIZATION - RAW EXPORT (MATCHES OFFICIAL TLOB REPO PATTERN)
# =============================================================================
#
# IMPORTANT: The official TLOB repo computes GLOBAL stats across ALL training
# data BEFORE saving to .npy files. Our Rust exporter cannot do this in a
# single pass (it processes day-by-day).
#
# SOLUTION: Export RAW data, then normalize in Python training code:
#   1. Export: Raw values (no normalization) 
#   2. Python: Compute global mean/std from ALL training files
#   3. Python: Apply training stats to train/val/test
#
# This matches TLOB/preprocessing/lobster.py::_normalize_dataframes() exactly.
#
# The lob-model-trainer will compute:
#   mean_prices = ALL_TRAIN_PRICES.mean()  (one value for all 20 price cols)
#   std_prices  = ALL_TRAIN_PRICES.std()   (one value for all 20 price cols)
#   mean_sizes  = ALL_TRAIN_SIZES.mean()   (one value for all 20 size cols)
#   std_sizes   = ALL_TRAIN_SIZES.std()    (one value for all 20 size cols)
#
# =============================================================================

[normalization]
lob_prices = "none"     # Export RAW - normalize in Python with GLOBAL stats
lob_sizes = "none"      # Export RAW - normalize in Python with GLOBAL stats  
derived = "none"        # Not used (include_derived = false)
mbo = "none"            # Not used (include_mbo = false)
signals = "none"        # Not used (include_signals = false)

reference_price = "mid_price"
bilinear_scale_factor = 50.0
