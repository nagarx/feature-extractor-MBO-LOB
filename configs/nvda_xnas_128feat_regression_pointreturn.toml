# =============================================================================
# NVDA XNAS 128-Feature — Point-to-Point Regression Labels
# =============================================================================
#
# CRITICAL DIFFERENCE from nvda_xnas_128feat_regression.toml:
#   return_type = "point_return" (NOT smoothed_return)
#
# Point-to-point: r_t^(k) = (m_{t+k} - m_t) / m_t * 10000
# This is the EXACT return earned from entering at t and exiting at t+k.
# No smoothing. Noisier than smoothed-average but directly matches execution.
#
# Motivation: Smoothed-average labels achieved R²=0.464 but only 38% win rate
# in backtesting because smoothed avg != point-to-point tradeable return.
# See: reports/regression_series_2026_03_15.md §5.3
#
# Output files per day:
#   {day}_sequences.npy          [N, 100, 128] float32
#   {day}_regression_labels.npy  [N, 3] float64  (point-to-point bps)
#   {day}_metadata.json
#
# =============================================================================

[experiment]
name = "NVDA XNAS 128-Feature Point-Return Regression"
description = "Point-to-point regression labels for execution-aligned training"
version = "1.0.0"
tags = ["nvda", "xnas", "128-features", "regression", "point-return", "execution-aligned"]

[symbol]
name = "NVDA"
exchange = "XNAS"
filename_pattern = "xnas-itch-{date}.mbo.dbn"
tick_size = 0.01

[data]
input_dir = "../data/hot_store"
hot_store_dir = "../data/hot_store"
output_dir = "../data/exports/nvda_xnas_128feat_regression_pointreturn"

[dates]
start_date = "2025-02-03"
end_date = "2026-01-06"
exclude_dates = [
    "2025-01-20", "2025-02-17", "2025-04-18", "2025-05-26",
    "2025-06-19", "2025-07-04", "2025-09-01", "2025-11-27",
    "2025-12-25", "2026-01-01",
]

[features]
lob_levels = 10
include_derived = true
include_mbo = true
include_signals = true
mbo_window_size = 1000

[features.experimental]
enabled = true
groups = ["institutional_v2", "volatility", "seasonality", "mlofi"]

[sampling]
strategy = "event_based"
event_count = 1000

[sequence]
window_size = 100
stride = 10
max_buffer_size = 50000

[labels]
strategy = "regression"
horizon = 60
horizons = [10, 60, 300]
return_type = "point_return"
smoothing_window = 10
threshold = 0.0008

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

[processing]
error_mode = "collect_errors"
verbose = false

[normalization]
lob_prices = "none"
lob_sizes = "none"
derived = "none"
mbo = "none"
signals = "none"
reference_price = "mid_price"
bilinear_scale_factor = 50.0
