# =============================================================================
# NVDA XNAS 128-Feature Full Dataset (Profiler-Aligned)
# =============================================================================
#
# Full 233-day extraction with all features including MLOFI.
# Configuration aligned with mbo-statistical-profiler findings:
#   - 10 LOB levels (L1 < 8% of depth on both exchanges)
#   - All 4 experimental groups including MLOFI (R² 0.10 → 0.60, Kolm 2023)
#   - Horizons include h=60 (1m) and h=300 (5m) per profiler signal hierarchy
#   - TLOB dynamic threshold adapts per horizon (profiler: ±12 bps at 1m, ±25 bps at 5m)
#
# Feature set: 40 LOB + 8 Derived + 36 MBO + 14 Signals + 30 Experimental = 128
#
# Profiler references:
#   - NVDA_UNIFIED_ANALYSIS_CONCLUSION.md §6 (Feature Extractor Configuration)
#   - TIER1_ANALYSIS_FINDINGS.md §4 (Feature Extractor Implications)
#   - CROSS_EXCHANGE_COMPARISON.md (XNAS vs ARCX exchange-specific properties)
#
# Usage:
#   cargo run --release --features parallel --bin export_dataset -- \
#       --config configs/nvda_xnas_128feat_full.toml
# =============================================================================

[experiment]
name = "NVDA XNAS 128-Feature Full (Profiler-Aligned)"
description = "233-day extraction with all features + MLOFI, profiler-aligned horizons and dynamic thresholds"
version = "1.0.0"
tags = ["nvda", "xnas", "128-features", "mlofi", "profiler-aligned", "full-233day"]

[symbol]
name = "NVDA"
exchange = "XNAS"
filename_pattern = "xnas-itch-{date}.mbo.dbn"
tick_size = 0.01

[data]
input_dir = "../data/hot_store"
hot_store_dir = "../data/hot_store"
output_dir = "../data/exports/nvda_xnas_128feat"

[dates]
start_date = "2025-02-03"
end_date = "2026-01-06"
exclude_dates = [
    "2025-01-20",   # MLK Day
    "2025-02-17",   # Presidents Day
    "2025-04-18",   # Good Friday
    "2025-05-26",   # Memorial Day
    "2025-06-19",   # Juneteenth
    "2025-07-04",   # Independence Day
    "2025-09-01",   # Labor Day
    "2025-11-27",   # Thanksgiving
    "2025-12-25",   # Christmas
    "2026-01-01",   # New Year's Day
]

# =============================================================================
# FEATURES — 128 total (98 stable + 30 experimental including MLOFI)
# =============================================================================
# Profiler finding: L1 < 8% of depth → 10 levels critical
# Profiler finding: OFI (#1), MLOFI (#2), Vol (#3), Spread (#4), Depth (#5)
# =============================================================================

[features]
lob_levels = 10
include_derived = true    # +8: mid_price, spread, imbalances
include_mbo = true        # +36: order flow, queue stats, institutional
include_signals = true    # +14: OFI, pressure, regime, gates
mbo_window_size = 1000

[features.experimental]
enabled = true
groups = ["institutional_v2", "volatility", "seasonality", "mlofi"]

# =============================================================================
# SAMPLING — Event-based (profiler validated: 9% noise at 1s, safe)
# =============================================================================

[sampling]
strategy = "event_based"
event_count = 1000

# =============================================================================
# SEQUENCES
# =============================================================================

[sequence]
window_size = 100
stride = 10
max_buffer_size = 50000

# =============================================================================
# LABELS — Multi-horizon with profiler-aligned horizons
# =============================================================================
# Profiler findings:
#   - Primary: 1m horizon (h=60, best signal/executability balance)
#   - Secondary: 5m horizon (h=300, strongest OFI r²=0.707)
#   - Short: 10s (h=10), 20s (h=20), 50s (h=50)
#   - Medium: 100s (h=100), 200s (h=200)
# Dynamic threshold: adapts per horizon, matching profiler ±12 bps at 1m
# =============================================================================

[labels]
strategy = "tlob"
horizon = 60
horizons = [10, 20, 50, 60, 100, 200, 300]
smoothing_window = 10
threshold = 0.0008

[labels.threshold_strategy]
type = "tlob_dynamic"
fallback = 0.0008
divisor = 2.0

# =============================================================================
# SPLIT
# =============================================================================

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

# =============================================================================
# PROCESSING
# =============================================================================

[processing]
error_mode = "collect_errors"
verbose = false

# =============================================================================
# NORMALIZATION — Raw export, Python normalizes
# =============================================================================

[normalization]
lob_prices = "none"
lob_sizes = "none"
derived = "none"
mbo = "none"
signals = "none"
reference_price = "mid_price"
bilinear_scale_factor = 50.0
