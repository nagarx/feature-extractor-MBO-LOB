# =============================================================================
# NVDA Dataset Configuration - TLOB Paper Compatible (RAW Export)
# =============================================================================
#
# This configuration exports RAW LOB data for TLOB model training.
# The BiN (Bilinear Normalization) layer in the TLOB model handles 
# all normalization internally with learnable parameters.
#
# Key Decision: RAW normalization (no pre-normalization)
#
# Research Reference:
# - TLOB Paper Section 5.2: "We employ a Bilinear Normalization layer 
#   as the initial layer" - meaning the model expects raw data
# - BiN Paper (Tran et al., 2021): BiN learns optimal γ_f and γ_t parameters
#
# Previous Issue: The old export applied market_structure_zscore which caused
# double-normalization when combined with the model's BiN layer.
#
# =============================================================================

[experiment]
name = "NVDA 11-Month TLOB-Ready (Raw Export)"
description = "Full 233-day dataset with raw LOB data for TLOB model with BiN layer"
version = "4.0.0"
tags = [
    "nvda",
    "98-features",
    "multi-horizon",
    "tlob",
    "raw-normalization",
    "bin-compatible",
    "production",
]

[symbol]
name = "NVDA"
exchange = "XNAS"
filename_pattern = "xnas-itch-{date}.mbo.dbn"
tick_size = 0.01

[data]
input_dir = "../data/hot_store"
hot_store_dir = "../data/hot_store"
output_dir = "../data/exports/nvda_tlob_raw_v2"

[dates]
start_date = "2025-02-03"
end_date = "2026-01-06"
# US Market Holidays 2025-2026
exclude_dates = [
    "2025-01-20",   # MLK Day
    "2025-02-17",   # Presidents Day
    "2025-04-18",   # Good Friday
    "2025-05-26",   # Memorial Day
    "2025-06-19",   # Juneteenth
    "2025-07-04",   # Independence Day
    "2025-09-01",   # Labor Day
    "2025-11-27",   # Thanksgiving
    "2025-12-25",   # Christmas
    "2026-01-01",   # New Year's Day
]

[features]
lob_levels = 10
include_derived = true
include_mbo = true
include_signals = true
mbo_window_size = 1000

[sampling]
strategy = "event_based"
event_count = 1000
volume_threshold = 1000

[sequence]
window_size = 100
stride = 10
max_buffer_size = 50000

[labels]
strategy = "tlob"
horizon = 50
horizons = [10, 20, 50, 100]
smoothing_window = 10
threshold = 0.0008

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

[processing]
error_mode = "collect_errors"
verbose = true

# =============================================================================
# NORMALIZATION CONFIGURATION - CRITICAL FOR TLOB
# =============================================================================
#
# For TLOB paper: ALL FEATURE GROUPS = NONE (raw export)
#
# The BiN layer in the TLOB model will handle normalization internally:
#   X̃ = γ_f * X̃_feature + γ_t * X̃_temporal
#
# where γ_f and γ_t are learnable parameters that the model optimizes
# during training. Pre-normalizing would interfere with this learning.
#
# Feature Groups:
#   - LOB prices (0-9, 20-29): Raw prices in dollars (e.g., $120.50)
#   - LOB sizes (10-19, 30-39): Raw sizes in shares (e.g., 100, 500)
#   - Derived (40-47): Spread, imbalance, microprice, etc.
#   - MBO (48-83): Microstructure features
#   - Signals (84-97): Trading signals (ALWAYS raw - includes categoricals)
#
# =============================================================================

[normalization]
# ALL GROUPS = NONE (raw values for TLOB paper compatibility)
lob_prices = "none"
lob_sizes = "none"
derived = "none"
mbo = "none"
signals = "none"  # CRITICAL: Never normalize (includes categoricals at 92,93,94,97)

# Reference settings (not used when strategy = "none", but included for completeness)
reference_price = "mid_price"
bilinear_scale_factor = 50.0
