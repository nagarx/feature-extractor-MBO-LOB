# =============================================================================
# NVDA ARCX 128-Feature Full Dataset (Profiler-Aligned)
# =============================================================================
#
# Full 233-day extraction from NYSE Arca with all features including MLOFI.
# Mirror of nvda_xnas_128feat_full.toml for fair cross-exchange comparison.
#
# Exchange-specific properties (from CROSS_EXCHANGE_COMPARISON.md):
#   - ARCX OFI-return r is 14pp higher than XNAS at 1s (0.688 vs 0.577)
#   - ARCX has thinner book (7,953 vs 18,189 shares) → larger OFI per event
#   - ARCX spread: 54.5% 1-tick (vs XNAS 70.3%)
#   - ARCX VWES: 1.10 bps (vs XNAS 1.97 bps)
#
# Usage:
#   cargo run --release --features parallel --bin export_dataset -- \
#       --config configs/nvda_arcx_128feat_full.toml
# =============================================================================

[experiment]
name = "NVDA ARCX 128-Feature Full (Profiler-Aligned)"
description = "233-day extraction from NYSE Arca with all features + MLOFI, profiler-aligned"
version = "1.0.0"
tags = ["nvda", "arcx", "128-features", "mlofi", "profiler-aligned", "full-233day"]

[symbol]
name = "NVDA"
exchange = "ARCX"
filename_pattern = "arcx-pillar-{date}.mbo.dbn"
tick_size = 0.01

[data]
input_dir = "../data/hot_store"
hot_store_dir = "../data/hot_store"
output_dir = "../data/exports/nvda_arcx_128feat"

[dates]
start_date = "2025-02-03"
end_date = "2026-01-06"
exclude_dates = [
    "2025-01-20",   # MLK Day
    "2025-02-17",   # Presidents Day
    "2025-04-18",   # Good Friday
    "2025-05-26",   # Memorial Day
    "2025-06-19",   # Juneteenth
    "2025-07-04",   # Independence Day
    "2025-09-01",   # Labor Day
    "2025-11-27",   # Thanksgiving
    "2025-12-25",   # Christmas
    "2026-01-01",   # New Year's Day
]

[features]
lob_levels = 10
include_derived = true
include_mbo = true
include_signals = true
mbo_window_size = 1000

[features.experimental]
enabled = true
groups = ["institutional_v2", "volatility", "seasonality", "mlofi"]

[sampling]
strategy = "event_based"
event_count = 1000

[sequence]
window_size = 100
stride = 10
max_buffer_size = 50000

[labels]
strategy = "tlob"
horizon = 60
horizons = [10, 20, 50, 60, 100, 200, 300]
smoothing_window = 10
threshold = 0.0008

[labels.threshold_strategy]
type = "tlob_dynamic"
fallback = 0.0008
divisor = 2.0

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

[processing]
error_mode = "collect_errors"
verbose = false

[normalization]
lob_prices = "none"
lob_sizes = "none"
derived = "none"
mbo = "none"
signals = "none"
reference_price = "mid_price"
bilinear_scale_factor = 50.0
