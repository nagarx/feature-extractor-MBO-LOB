# =============================================================================
# NVDA 11-Month Triple Barrier Dataset Configuration
# =============================================================================
#
# Complete NVIDIA dataset: Feb 3, 2025 → Jan 6, 2026 (233 trading days)
# with Triple Barrier labeling for risk-managed trading decisions.
#
# Schema version: 3.1 (98 features, Triple Barrier labels)
#
# WHY TRIPLE BARRIER?
# ===================
# Unlike TLOB which asks "what is the price trend?", Triple Barrier asks:
# "If I enter a trade now, what happens first?"
#
#   +1 = Hit profit target (ProfitTarget - winning trade)
#   -1 = Hit stop-loss (StopLoss - losing trade)
#    0 = Timeout (neither barrier hit - DON'T TRADE)
#
# This directly models trading decisions with explicit risk management.
#
# RESEARCH REFERENCE:
# López de Prado, M. (2018). "Advances in Financial Machine Learning", Chapter 3.
#
# Usage:
#   cd feature-extractor-MBO-LOB
#   cargo run --release --features parallel --bin export_dataset -- \
#       --config configs/nvda_11month_triple_barrier.toml
#
# =============================================================================

[experiment]
name = "NVDA 11-Month Triple Barrier Dataset"
description = "Full 233-day dataset with Triple Barrier risk-managed labeling"
version = "3.1.0"
tags = [
    "nvda",
    "98-features",
    "triple-barrier",
    "risk-managed",
    "complete-dataset",
    "production",
]

[symbol]
name = "NVDA"
exchange = "XNAS"
filename_pattern = "xnas-itch-{date}.mbo.dbn.zst"
tick_size = 0.01

[data]
input_dir = "../data/NVDA_2025-02-03_to_2026-01-07"
output_dir = "../data/exports/nvda_11month_triple_barrier"
hot_store_dir = "../data/hot_store"

[dates]
start_date = "2025-02-03"
end_date = "2026-01-06"

exclude_dates = [
    "2025-01-20",  # MLK Day
    "2025-02-17",  # Presidents Day
    "2025-04-18",  # Good Friday
    "2025-05-26",  # Memorial Day
    "2025-06-19",  # Juneteenth
    "2025-07-04",  # Independence Day
    "2025-09-01",  # Labor Day
    "2025-11-27",  # Thanksgiving
    "2025-12-25",  # Christmas
    "2026-01-01",  # New Year
]

[features]
lob_levels = 10
include_derived = true
include_mbo = true
include_signals = true
mbo_window_size = 1000

[sampling]
strategy = "event_based"
event_count = 1000

[sequence]
window_size = 100
stride = 10
max_buffer_size = 50000

# =============================================================================
# TRIPLE BARRIER CONFIGURATION
# =============================================================================
#
#     Price
#       ▲  ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─  Upper Barrier (Profit Target)
#       │                            ↑ profit_target_pct (0.5%)
#       │  ●─────────●───────────────●
#       │  Entry    │                │  ← Price path
#       │           │                │
#       ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─│  Lower Barrier (Stop-Loss)
#                                    │     ↓ stop_loss_pct (0.3%)
#                   │◄───────────────►│
#                     max_horizon
#
# Risk/Reward = 0.5% / 0.3% = 1.67:1 → Need ~38% win rate to break even

[labels]
strategy = "triple_barrier"

# Profit target: 0.5% = 50 basis points
profit_target_pct = 0.005

# Stop-loss: 0.3% = 30 basis points  
stop_loss_pct = 0.003

# Maximum holding periods (vertical barriers)
# Multiple horizons for experimentation
max_horizons = [50, 100, 200]

# Timeout = "don't trade" signal
timeout_strategy = "label_as_timeout"

[split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

[processing]
error_mode = "collect_errors"
verbose = true

# =============================================================================
# EXPECTED OUTPUTS
# =============================================================================
#
# Labels encoded for PyTorch CrossEntropyLoss:
#   0 = StopLoss (hit lower barrier first)
#   1 = Timeout (neither barrier hit)
#   2 = ProfitTarget (hit upper barrier first)
#
# Expected class distribution (0.5%/0.3% barriers, h=100):
#   - ProfitTarget: ~20-30%
#   - StopLoss: ~15-25%
#   - Timeout: ~45-60%
#
# TRAINING RECOMMENDATION:
#   Only trade when:
#     - Model predicts ProfitTarget (class 2)
#     - AND confidence > 0.7
#
# =============================================================================
