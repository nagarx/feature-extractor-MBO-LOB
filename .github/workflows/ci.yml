name: CI

# Toolchain pinning strategy:
# All jobs use a PINNED Rust version (not @stable) to prevent surprise CI
# failures from new Clippy lints or dependency MSRV bumps. Bump deliberately
# by updating the version tag below when ready to adopt new toolchain features.
# To bump: change all `dtolnay/rust-toolchain@X.Y.Z` tags to the new version.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Run tests
        run: cargo test --features "parallel,databento" 2>&1 | tee test_output.txt

      - name: Verify minimum test count
        run: |
          PASSED=$(grep -oP '\d+ passed' test_output.txt | grep -oP '\d+' | awk '{s+=$1}END{print s}')
          echo "Total tests passed (summed across all test binaries): $PASSED"
          if [ -z "$PASSED" ] || [ "$PASSED" -lt 700 ]; then
            echo "::error::Expected at least 700 tests, got ${PASSED:-0}. Possible test module breakage."
            exit 1
          fi

      - name: Run tests (no default features)
        run: cargo test --no-default-features

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.toml') }}

      - name: Run clippy
        run: cargo clippy --features "parallel,databento" -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Check documentation
        run: cargo doc --no-deps --features "parallel,databento"
        env:
          RUSTDOCFLAGS: -D warnings

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.toml') }}

      - name: Run benchmarks (compile only)
        run: cargo bench --no-run
